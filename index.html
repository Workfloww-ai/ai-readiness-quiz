<style>
  :root {
    --white: #ffffff;
    --muted: #b0aec3;
    --faint: rgba(255,255,255,0.30);
    --peri: #8691fd;     /* emphasis / italic / score / labels */
    --purple: #6357d4;
    --blue: #1f6bf5;     /* action / CTA / progress */
    --hairline: rgba(255,255,255,0.10);
    --surface: rgba(255,255,255,0.035);
    --tile: rgba(134,145,253,0.14);
    --tile-bd: rgba(134,145,253,0.40);
    --font-sans: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
    --font-serif: 'Newsreader', Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    background:
      radial-gradient(680px 360px at 50% -6%, rgba(72,66,168,0.40), transparent 62%),
      linear-gradient(180deg, #1c1c40 0%, #14132b 34%, #0b0a16 72%, #08080f 100%);
    background-attachment: fixed;
    font-family: var(--font-sans);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
    display: flex; justify-content: center;
    padding: 28px 20px;
  }
  ::selection { background: var(--blue); color: #fff; }

  .frame { width: 100%; max-width: 460px; margin: auto; display: flex; flex-direction: column; }

  /* header */
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 30px; }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo img { height: 26px; width: auto; display: block; }
  .logo .wm { font-weight: 700; font-size: 18px; color: var(--white); letter-spacing: -0.01em; }
  .badge {
    font-size: 10.5px; font-weight: 500; color: rgba(255,255,255,0.82);
    border: 1px solid var(--hairline); background: rgba(255,255,255,0.04);
    border-radius: 999px; padding: 6px 12px; white-space: nowrap; letter-spacing: 0.01em;
  }

  main { flex: 1 1 auto; }

  .label { display: block; font-weight: 500; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--peri); }

  /* intro */
  .hero { font-family: var(--font-serif); font-weight: 400; color: var(--white);
          font-size: clamp(32px, 9vw, 44px); line-height: 1.1; letter-spacing: -0.01em; margin-top: 16px; }
  .hero em { font-style: italic; font-weight: 400; color: var(--peri); }
  .sub { color: var(--muted); font-size: 16px; line-height: 1.62; margin-top: 18px; }
  .meta { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 26px; }
  .meta span { font-size: 13px; color: var(--muted); font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
  .meta i { width: 5px; height: 5px; border-radius: 50%; background: var(--peri); flex: none; }

  /* buttons */
  .btn {
    appearance: none; border: none; cursor: pointer; width: 100%;
    font-family: var(--font-sans); font-weight: 700; font-size: 16px;
    color: #fff; background: var(--blue); border-radius: 999px; padding: 17px 24px; line-height: 1.2;
    transition: filter .18s ease, transform .12s ease, box-shadow .2s ease;
    box-shadow: 0 0 0 1px rgba(120,150,255,0.25), 0 14px 40px -8px rgba(31,107,245,0.6);
  }
  .btn:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(120,150,255,0.4), 0 18px 50px -8px rgba(31,107,245,0.75); }
  .btn:active { transform: translateY(0); }
  .btn-primary { margin-top: 30px; }
  .btn.ghost { background: transparent; color: var(--muted); box-shadow: none; font-weight: 500; font-size: 14px; padding: 14px; margin-top: 4px; }
  .btn.ghost:hover { color: var(--white); filter: none; transform: none; }

  /* progress */
  .phead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 13px; }
  .phead .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }
  .phead .lbl b { color: var(--white); font-weight: 700; }
  .bar { height: 4px; background: rgba(255,255,255,0.10); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: var(--blue); border-radius: 999px;
             box-shadow: 0 0 12px rgba(31,107,245,0.7); transition: width .45s cubic-bezier(.2,.7,.2,1); }

  .qtext { font-weight: 700; color: var(--white); font-size: clamp(21px, 6vw, 27px); line-height: 1.28; letter-spacing: -0.01em; margin: 28px 0 24px; }

  .opt {
    display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; padding: 16px;
    margin-bottom: 11px; transition: border-color .14s ease, background .14s ease, transform .14s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:active { transform: scale(0.99); }
  @media (hover: hover) { .opt:hover { border-color: var(--peri); background: rgba(134,145,253,0.10); } }
  .opt .k { flex: none; width: 32px; height: 32px; border-radius: 9px; background: var(--tile); border: 1px solid var(--tile-bd);
            color: var(--peri); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .opt .t { font-size: 15.5px; color: #eef0f8; font-weight: 500; line-height: 1.35; }

  /* email */
  .field {
    width: 100%; font-family: var(--font-sans); font-size: 16px; color: var(--white);
    background: rgba(255,255,255,0.04); border: 1px solid var(--hairline); border-radius: 12px;
    padding: 16px; margin-top: 24px; outline: none; transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(31,107,245,0.18); }
  .field::placeholder { color: rgba(255,255,255,0.4); }
  .form { display: grid; gap: 12px; margin-top: 22px; }
  .form .field { margin-top: 0; }
  .formerr { color: #ffb38a; font-size: 13px; font-weight: 500; margin-top: 12px; min-height: 1px; }

  .checks { list-style: none; margin-top: 24px; display: grid; gap: 14px; }
  .checks li { display: flex; gap: 12px; align-items: flex-start; font-size: 15px; color: #eef0f8; font-weight: 500; line-height: 1.45; }
  .checks .ck { flex: none; width: 26px; height: 26px; border-radius: 7px; background: var(--tile); border: 1px solid var(--tile-bd);
                color: var(--peri); font-size: 13px; display: flex; align-items: center; justify-content: center; }

  .fineprint { font-size: 12.5px; color: var(--muted); margin-top: 16px; line-height: 1.55; }

  /* result */
  .res { text-align: center; }
  .score { font-weight: 700; color: var(--peri); font-size: clamp(86px, 30vw, 124px); line-height: 0.9; letter-spacing: -0.04em; margin-top: 18px;
           text-shadow: 0 0 50px rgba(134,145,253,0.4); }
  .score .slash { color: var(--muted); font-size: 0.3em; vertical-align: super; text-shadow: none; }
  .pill { display: inline-flex; align-items: center; gap: 9px; margin-top: 20px; font-weight: 700; font-size: 12px;
          letter-spacing: 0.14em; text-transform: uppercase; color: #fff;
          padding: 8px 15px; border-radius: 999px; border: 1px solid var(--hairline); background: rgba(255,255,255,0.04); }
  .pill i { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .res-serif { font-family: var(--font-serif); font-weight: 400; color: var(--white);
               font-size: clamp(25px, 6.4vw, 31px); line-height: 1.18; margin: 24px auto 0; max-width: 360px; }
  .res-serif em { font-style: italic; color: var(--peri); }
  .verdict { color: var(--muted); font-size: 15.5px; line-height: 1.65; margin: 18px auto 0; max-width: 380px; }
  .verdict b { color: #9fb4ff; font-weight: 700; }
  .res .btn-primary { margin-top: 34px; }

  /* footer */
  .foot { color: var(--faint); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; text-align: center;
          line-height: 1.5; margin-top: 34px; padding-top: 4px; }

  .fade { animation: fade .42s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

      <span class="badge">AI MetaMind &middot; HR Series</span>
    </header>
    <main id="app"></main>
    <div class="foot">For HR professionals who refuse to fall behind.</div>
  </div>

<script>
/* ---------- DATA (HR-specific) ---------- */
const QUESTIONS = [
  { q: "How often do you use AI in your HR work \u2014 JDs, screening, policies, comms?",
    a: [["Never", 0], ["Tried it once or twice", 3], ["A few times a month", 6], ["Weekly", 8], ["Every day", 10]] },
  { q: "Could you name 3 HR tasks AI could take off your plate this week?",
    a: [["No idea", 0], ["Maybe one", 4], ["Two or three", 7], ["I already automate them", 10]] },
  { q: "How do you write job descriptions and offer letters?",
    a: [["From scratch every time", 0], ["I reuse old templates", 4], ["AI draft, then I edit", 7], ["Fully systemised with AI", 10]] },
  { q: "Faced with a stack of 200 r\u00e9sum\u00e9s, you\u2026",
    a: [["Read each one manually", 0], ["Skim them manually", 3], ["Lean on ATS keyword filters", 6], ["Use AI to shortlist & summarise", 10]] },
  { q: "How would you rate your prompting skill for HR tasks?",
    a: [["What's a prompt?", 0], ["I type basic questions", 4], ["I write detailed prompts", 7], ["I reuse a prompt library", 10]] },
  { q: "Drafting a policy or a sensitive employee email\u2026",
    a: [["Takes me hours from scratch", 0], ["I adapt old documents", 4], ["AI first draft, I refine", 7], ["Done in minutes with AI", 10]] },
  { q: "Do you know how AI is reshaping HR roles at other companies?",
    a: [["No clue", 0], ["Heard things", 3], ["Somewhat", 6], ["I track it closely", 10]] },
  { q: "Have you used AI to read people data \u2014 engagement, attrition, comp?",
    a: [["Never", 0], ["A bit", 4], ["A few times", 7], ["Regularly", 10]] },
  { q: "Do you have a system to stay current as HR-AI tools change?",
    a: [["No", 0], ["I catch headlines", 3], ["I follow a few sources", 6], ["A structured routine", 10]] },
  { q: "If leadership asked you to run HR with a leaner team using AI next quarter, could you?",
    a: [["Definitely not", 0], ["Doubtful", 3], ["Maybe", 6], ["Yes, comfortably", 10]] },
];

const TIERS = [
  { min: 0,  max: 30,  name: "At Risk",          dot: "#ea8c2b",
    head: "You're Closer to the <em>Edge</em> Than You Think.",
    verdict: "You're in the danger zone, and the gap <b>compounds every month</b> you wait. The one good thing: this is the easiest it will ever be to catch up \u2014 the right system turns it around fast." },
  { min: 31, max: 60,  name: "Falling Behind",    dot: "#ea8c2b",
    head: "The Gap Is Opening \u2014 <em>Fast.</em>",
    verdict: "You've dabbled, but dabbling won't hold your ground. You're <b>one AI-fluent colleague away</b> from looking replaceable. A focused few weeks would put you ahead of most HR pros who took this test." },
  { min: 61, max: 85,  name: "Keeping Pace",      dot: "#1f6bf5",
    head: "You're Ahead. <em>For Now.</em>",
    verdict: "You're ahead of most HR teams \u2014 but \u201cmost\u201d is a low bar in 2026, and it's rising. <b>Don't let this lead quietly slip.</b> The difference now is depth, not awareness." },
  { min: 86, max: 100, name: "Ahead of the Curve", dot: "#16a34a",
    head: "You're Ahead of <em>Almost Everyone.</em>",
    verdict: "Rare \u2014 you're in the top tier of HR. The uncomfortable part: <b>this edge closes in months, not years.</b> Staying ahead is a different game than getting here, and most people lose it." },
];

/* ---------- STATE ---------- */
let answers = [], qIndex = 0;
const app = document.getElementById("app");
const fb = (...a) => { try { if (window.fbq) fbq(...a); } catch (e) {} };
/* Google Sheet endpoint — paste your Apps Script Web App /exec URL here */
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbzaCRjnPLvYpKLcm8KiYKrojdw1ap1hPxiikY84XhzOcgIz3UvwNeAXOkiqzPACiIzw9A/exec";
const scoreTotal = () => answers.reduce((s, v) => s + (v || 0), 0);
const tierFor = s => TIERS.find(t => s >= t.min && s <= t.max);

/* ---------- SCREENS ---------- */
function renderIntro() {
  app.className = "fade";
  app.innerHTML = `
    <span class="label">AI Readiness Assessment &middot; For HR</span>
    <h1 class="hero">How Far Behind Are You, <em>Really?</em></h1>
    <p class="sub">Most HR professionals overestimate where they stand on AI \u2014 by a lot. This 10-question assessment gives you one honest number, and shows what it means for your role over the next 12 months.</p>
    <div class="meta">
      <span><i></i> 10 questions</span>
      <span><i></i> ~2 minutes</span>
      <span><i></i> Scored 0&ndash;100</span>
    </div>
    <button class="btn btn-primary" id="start">Begin the assessment &rarr;</button>
  `;
  document.getElementById("start").onclick = () => { fb('trackCustom','QuizStarted'); qIndex = 0; answers = []; renderQuestion(); };
}

function renderQuestion() {
  const item = QUESTIONS[qIndex];
  const pct = Math.round(qIndex / QUESTIONS.length * 100);
  const keys = ["A","B","C","D","E"];
  app.className = "fade";
  app.innerHTML = `
    <div class="phead">
      <span class="lbl">Question <b>${String(qIndex+1).padStart(2,"0")}</b> / ${QUESTIONS.length}</span>
      <span class="lbl">${pct}% complete</span>
    </div>
    <div class="bar"><i></i></div>
    <div class="qtext">${item.q}</div>
    <div id="opts">
      ${item.a.map((o,i)=>`<button class="opt" data-pts="${o[1]}"><span class="k">${keys[i]}</span><span class="t">${o[0]}</span></button>`).join("")}
    </div>
  `;
  requestAnimationFrame(() => { app.querySelector(".bar > i").style.width = pct + "%"; });
  app.querySelectorAll(".opt").forEach(btn => {
    btn.onclick = () => {
      answers[qIndex] = parseInt(btn.dataset.pts, 10);
      qIndex++;
      (qIndex < QUESTIONS.length) ? renderQuestion() : renderEmail();
    };
  });
}

function renderEmail() {
  app.className = "fade";
  app.innerHTML = `
    <div class="phead"><span class="lbl">Assessment complete</span><span class="lbl">100%</span></div>
    <div class="bar"><i></i></div>
    <div class="qtext" style="margin-top:28px;">Your score is ready.</div>
    <p class="sub" style="margin-top:12px;">Tell us where to send it \u2014 and unlock the full breakdown of where you're most exposed and what to fix first.</p>
    <div class="form">
      <input class="field" id="f_name"  type="text"  placeholder="Full name"        autocomplete="name" />
      <input class="field" id="f_email" type="email" placeholder="Work email"        autocomplete="email" inputmode="email" />
      <input class="field" id="f_phone" type="tel"   placeholder="Phone number"      autocomplete="tel" inputmode="tel" />
      <input class="field" id="f_title" type="text"  placeholder="Job title"         autocomplete="organization-title" />
      <input class="field" id="f_org"   type="text"  placeholder="Organisation name" autocomplete="organization" />
    </div>
    <p class="formerr" id="formerr"></p>
    <button class="btn btn-primary" id="reveal" style="margin-top:8px;">Reveal my score &rarr;</button>
    <p class="fineprint">All fields required. We'll send your report and occasional updates from workfloww.ai. Unsubscribe anytime.</p>
  `;
  const F = {
    name:  document.getElementById("f_name"),
    email: document.getElementById("f_email"),
    phone: document.getElementById("f_phone"),
    title: document.getElementById("f_title"),
    org:   document.getElementById("f_org"),
  };
  const err = document.getElementById("formerr");
  Object.values(F).forEach(el => el.addEventListener("input", () => { el.style.borderColor = ""; }));

  const submit = () => {
    const v = {
      name:  F.name.value.trim(),
      email: F.email.value.trim(),
      phone: F.phone.value.trim(),
      title: F.title.value.trim(),
      org:   F.org.value.trim(),
    };
    const bad = [];
    if (v.name.length < 2) bad.push(F.name);
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email)) bad.push(F.email);
    if (v.phone.replace(/[^0-9]/g, "").length < 7) bad.push(F.phone);
    if (v.title.length < 2) bad.push(F.title);
    if (v.org.length < 2) bad.push(F.org);

    if (bad.length) {
      bad.forEach(el => el.style.borderColor = "#ea8c2b");
      err.textContent = "Please complete every field with valid details.";
      bad[0].focus();
      return;
    }
    err.textContent = "";
    const lead = { ...v, score: scoreTotal(), tier: tierFor(scoreTotal()).name };
    fb('track','Lead',{ content_name:'AI Readiness Test for HR', content_category:'HR', status:lead.tier, score:lead.score });
    if (SHEET_ENDPOINT.indexOf("http") === 0) {
      fetch(SHEET_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(lead)
      }).catch(() => {});
    }
    renderResult();
  };
  document.getElementById("reveal").onclick = submit;
  Object.values(F).forEach(el => el.addEventListener("keydown", e => { if (e.key === "Enter") submit(); }));
}

function renderResult() {
  const total = scoreTotal(), tier = tierFor(total);
  app.className = "fade";
  app.innerHTML = `
    <div class="res">
      <span class="label">Your AI Readiness Score</span>
      <div class="score"><span id="num">0</span><span class="slash">/100</span></div>
      <span class="pill"><i style="background:${tier.dot}"></i>${tier.name}</span>
      <div class="res-serif">${tier.head}</div>
      <p class="verdict">${tier.verdict}</p>
      <button class="btn btn-primary" id="cta">Reserve your seat &rarr;</button>
      <button class="btn ghost" id="again">Retake the test</button>
    </div>
  `;
  const numEl = document.getElementById("num"), dur = 1100, start = performance.now();
  (function tick(now){
    const p = Math.min((now - start) / dur, 1);
    numEl.textContent = Math.round((1 - Math.pow(1 - p, 3)) * total);
    if (p < 1) requestAnimationFrame(tick);
  })(start);
  /* >>> POINT THIS AT YOUR OFFER (registration / sales page / booking link) <<< */
  document.getElementById("cta").onclick = () => { fb('track','InitiateCheckout'); window.location.href = "#your-offer-url"; };
  document.getElementById("again").onclick = renderIntro;
}

renderIntro();
</script>
